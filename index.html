<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#163c52">
  <title>BoatBuilder</title>
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <a class="skip-link" href="#app-main">Skip to content</a>
  <header class="app-header">
    <div class="header-row">
      <button id="back-button" class="icon-button" type="button" aria-label="Go back" hidden>‹</button>
      <button id="home-button" class="brand-button" type="button" aria-label="BoatBuilder home">
        <span class="brand-mark" aria-hidden="true">⚓</span>
        <span>
          <strong>BoatBuilder</strong>
          <small>Package research & estimate</small>
        </span>
      </button>
      <button id="estimate-button" class="estimate-button" type="button">
        Estimate <span id="estimate-count" class="count-badge">0</span>
      </button>
    </div>
  </header>

  <main id="app-main" tabindex="-1">
    <div id="loading" class="status-card">Loading the catalog…</div>
    <div id="app" hidden></div>
  </main>

  <template id="empty-template">
    <section class="empty-state">
      <h2>Nothing here yet</h2>
      <p>This section does not have any catalog records.</p>
    </section>
  </template>

  <script src="data/catalog.js?v=5" defer></script>
  <script src="app.js?v=5" defer></script>
</body>
</html>
