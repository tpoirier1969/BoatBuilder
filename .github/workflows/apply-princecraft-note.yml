name: Apply Princecraft naming note

on:
  push:
    branches: [main]
    paths:
      - scripts/apply_princecraft_note.py
      - .github/workflows/apply-princecraft-note.yml

permissions:
  contents: write

jobs:
  apply-note:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch canonical app file and remove one-time helper
        run: python scripts/apply_princecraft_note.py

      - name: Commit directly to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Princecraft naming guidance"
          git push origin HEAD:main
