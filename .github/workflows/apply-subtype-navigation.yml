name: Apply subtype navigation update

on:
  push:
    branches: [main]
    paths:
      - data/subtype-navigation-trigger.txt

permissions:
  contents: write

concurrency:
  group: boatbuilder-subtype-navigation
  cancel-in-progress: false

jobs:
  apply-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install workbook reader
        run: python -m pip install --disable-pip-version-check openpyxl

      - name: Patch canonical files
        run: python scripts/apply_subtype_navigation.py

      - name: Rebuild bundled catalog
        run: python scripts/build_catalog.py --output data/catalog.js

      - name: Run QA
        run: |
          node --check app.js
          python -m py_compile scripts/build_catalog.py
          node scripts/qa_app.mjs

      - name: Commit update to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add electronics and electrical type navigation"
            git push origin HEAD:main
          fi