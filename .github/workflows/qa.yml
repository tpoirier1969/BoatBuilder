name: BoatBuilder QA

on:
  push:
    branches: [main]
    paths:
      - index.html
      - styles.css
      - app.js
      - data/catalog.js
      - tests/qa.mjs
      - .github/workflows/qa.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out main
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Check JavaScript syntax
        run: node --check app.js

      - name: Run catalog and estimate QA
        run: node tests/qa.mjs
