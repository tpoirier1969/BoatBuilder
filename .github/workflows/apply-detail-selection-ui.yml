name: Apply detail selection UI

on:
  push:
    branches: [main]
    paths:
      - scripts/apply_detail_selection_ui.py
      - .github/workflows/apply-detail-selection-ui.yml

permissions:
  contents: write

concurrency:
  group: boatbuilder-detail-selection-ui
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply requested changes
        run: python scripts/apply_detail_selection_ui.py

      - name: Check JavaScript syntax
        run: node --check app.js

      - name: Run BoatBuilder QA
        run: node tests/qa.mjs

      - name: Remove one-time helper
        run: git rm scripts/apply_detail_selection_ui.py .github/workflows/apply-detail-selection-ui.yml

      - name: Commit changes to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html styles.css ProjectRules.md tests/qa.mjs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Require detail options before estimate selection"
            git push origin HEAD:main
          fi